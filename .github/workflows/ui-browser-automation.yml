name: UI Browser Automation

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "README.md"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.mjs"
      - "src/**"
      - "tests/browser/**"
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "README.md"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.mjs"
      - "src/**"
      - "tests/browser/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install browser automation dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright browser automation suite
        run: npm run test:e2e
